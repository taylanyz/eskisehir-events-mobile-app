# ============================================================
# Eskişehir Event API - Development Configuration (PostgreSQL Local)
# ============================================================
# Uses local PostgreSQL database for development.
# Quick start with Docker: docker-compose up -d
#   -> DB: localhost:5432, user: eskisehir_user, pass: eskisehir_pass
#   -> pgAdmin: http://localhost:5050 (admin@eskisehir.local / admin)
# For H2 in-memory: --spring.profiles.active=h2
# ============================================================

spring.application.name=eskisehir-event-api
server.port=8080

# PostgreSQL Database (Local Development)
# Default credentials match docker-compose.yml; override via env vars
spring.datasource.url=jdbc:postgresql://localhost:5433/eskisehir_events_db
spring.datasource.username=${DB_USERNAME:eskisehir_user}
spring.datasource.password=${DB_PASSWORD:eskisehir_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool (dev settings)
spring.datasource.hikari.pool-name=EskisehirDevPool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway Database Migrations (enabled by default)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baselineOnMigrate=true
spring.flyway.validate-on-migrate=true

# Jackson Date Format
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET:mySecretKeyForJwtTokenGenerationAndValidationPurposesDuringDevelopmentPhase}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

# Logging
logging.level.com.eskisehir.eventapi=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.flywaydb=INFO

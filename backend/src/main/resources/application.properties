# ============================================================
# Eskişehir Event API - Development Configuration (PostgreSQL Local)
# ============================================================
# Uses local PostgreSQL database for development.
# Assumes PostgreSQL is running on localhost:5432
# For H2 in-memory, use: --spring.profiles.active=h2
# ============================================================

spring.application.name=eskisehir-event-api
server.port=8080

# PostgreSQL Database (Local Development)
# IMPORTANT: Ensure PostgreSQL is running locally
# Create database: createdb -U postgres eskisehir_events_db
spring.datasource.url=jdbc:postgresql://localhost:5432/eskisehir_events_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway Database Migrations (enabled by default)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baselineOnMigrate=true

# Jackson Date Format
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT Configuration
# Secret key for signing JWT tokens (change in production!)
# Must be at least 256 bits (32 bytes) for HS256
# Can be overridden by APP_JWT_SECRET environment variable
app.jwt.secret=${APP_JWT_SECRET:mySecretKeyForJwtTokenGenerationAndValidationPurposesDuringDevelopmentPhase}
# Token expiration in milliseconds (24 hours)
# Can be overridden by APP_JWT_EXPIRATION environment variable
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

# Logging
logging.level.com.eskisehir.eventapi=INFO
logging.level.org.hibernate.SQL=WARN

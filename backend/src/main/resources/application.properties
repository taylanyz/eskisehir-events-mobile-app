# ============================================================
# Eskişehir Event API - Development Configuration
# ============================================================
# Uses H2 in-memory database for easy local development.
# No PostgreSQL installation required.
# ============================================================

spring.application.name=eskisehir-event-api
server.port=8080

# H2 In-Memory Database (Development)
spring.datasource.url=jdbc:h2:mem:eventdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Console (accessible at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Jackson Date Format
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT Configuration
# Secret key for signing JWT tokens (change in production!)
# Must be at least 256 bits (32 bytes) for HS256
# Can be overridden by APP_JWT_SECRET environment variable
app.jwt.secret=${APP_JWT_SECRET:mySecretKeyForJwtTokenGenerationAndValidationPurposesDuringDevelopmentPhase}
# Token expiration in milliseconds (24 hours)
# Can be overridden by APP_JWT_EXPIRATION environment variable
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

# Logging
logging.level.com.eskisehir.eventapi=INFO
logging.level.org.hibernate.SQL=WARN

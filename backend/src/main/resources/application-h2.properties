# ============================================================
# H2 In-Memory Profile - For quick local testing only
# Activate with: --spring.profiles.active=h2
# ============================================================

spring.application.name=eskisehir-event-api
server.port=8080

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:eventdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Disable Flyway for H2 profile (we use Hibernate ddl-auto instead)
spring.flyway.enabled=false

# Jackson Date Format
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET:mySecretKeyForJwtTokenGenerationAndValidationPurposesDuringDevelopmentPhase}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

# Logging
logging.level.com.eskisehir.eventapi=INFO
logging.level.org.hibernate.SQL=WARN

# ============================================================
# Eskişehir Event API - Production Configuration
# ============================================================
# Uses PostgreSQL. Activate with: --spring.profiles.active=prod
# ============================================================

spring.application.name=eskisehir-event-api
server.port=8080

# PostgreSQL Database
# IMPORTANT: Set APP_DB_URL, APP_DB_USERNAME and APP_DB_PASSWORD in production
spring.datasource.url=${APP_DB_URL}
spring.datasource.username=${APP_DB_USERNAME}
spring.datasource.password=${APP_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway Database Migrations (enabled in production)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baselineOnMigrate=false

# Disable H2 Console in production
spring.h2.console.enabled=false

# Jackson Date Format
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT Configuration (Production)
# IMPORTANT: Set APP_JWT_SECRET and APP_JWT_EXPIRATION environment variables in production
# APP_JWT_SECRET should be a strong, random key (at least 256 bits / 32 bytes)
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration=${APP_JWT_EXPIRATION:604800000}

# Logging
logging.level.com.eskisehir.eventapi=INFO

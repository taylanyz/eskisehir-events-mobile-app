# ============================================================
# Eskişehir Event API - Production Configuration
# ============================================================
# Uses PostgreSQL. Activate with: --spring.profiles.active=prod
# All sensitive values MUST be supplied via environment variables.
# See .env.example for the full list of required variables.
# ============================================================

spring.application.name=eskisehir-event-api
server.port=8080

# PostgreSQL Database (all required — no defaults for production)
spring.datasource.url=${APP_DB_URL}
spring.datasource.username=${APP_DB_USERNAME}
spring.datasource.password=${APP_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool (production-grade settings)
spring.datasource.hikari.pool-name=EskisehirProdPool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.leak-detection-threshold=60000

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway Database Migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baselineOnMigrate=false
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false

# Disable H2 Console in production
spring.h2.console.enabled=false

# Jackson Date Format
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT Configuration (all required — no defaults for production)
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration=${APP_JWT_EXPIRATION:604800000}

# Logging (production levels)
logging.level.com.eskisehir.eventapi=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.flywaydb=WARN
logging.level.org.springframework.security=WARN

# Actuator (expose only health and info in production)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

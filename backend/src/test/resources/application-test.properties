# Test Configuration
spring.application.name=eskisehir-event-api-test
server.port=8080

# H2 In-Memory Database (Test)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JWT Configuration (Test)
app.jwt.secret=testSecretKeyForJwtTokenGenerationAndValidationPurposesDuringTestPhase
app.jwt.expiration=86400000

# Logging
logging.level.com.eskisehir.eventapi=INFO
logging.level.org.hibernate.SQL=WARN

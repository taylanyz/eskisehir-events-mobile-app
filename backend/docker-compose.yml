services:
  postgres:
    image: postgres:15-alpine
    container_name: eskisehir_postgres
    environment:
      POSTGRES_DB: eskisehir_events_db
      POSTGRES_USER: eskisehir_user
      POSTGRES_PASSWORD: eskisehir_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eskisehir_user -d eskisehir_events_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: eskisehir_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@eskisehir.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
